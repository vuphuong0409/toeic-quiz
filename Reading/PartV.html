<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

        const quizContainer = document.getElementById('quiz-container');
        const questionState = new Map();
        let correctCount = 0;
        let incorrectCount = 0;

        function recomputeScore() {
            let c = 0;
            let i = 0;
            for (const v of questionState.values()) {
                if (v === true) c++;
                else if (v === false) i++;
            }
            correctCount = c;
            incorrectCount = i;
        }

        function updateScore() {
            const totalAnswered = questionState.size;
            const totalQuestions = questions.length;
            document.getElementById('correctScore').textContent = String(correctCount);
            document.getElementById('incorrectScore').textContent = String(incorrectCount);
            document.getElementById('totalScore').textContent = `${totalAnswered}/${totalQuestions}`;
        }

        function lockQuestion(qid) {
            const labels = document.querySelectorAll(`input[name="q${qid}"]`);
            labels.forEach(inp => {
                const lab = inp.closest('label');
                if (lab) {
                    lab.style.pointerEvents = 'none';
                    lab.style.opacity = '0.75';
                }
            });
        }

        function resetQuiz() {
            correctCount = 0;
            incorrectCount = 0;
            questionState.clear();

            document.querySelectorAll('input[type="radio"]').forEach(i => (i.checked = false));
            document.querySelectorAll('.feedback').forEach(f => {
                f.classList.remove('show', 'correct', 'incorrect');
                f.textContent = '';
            });
            document.querySelectorAll('.options label').forEach(lab => {
                lab.style.pointerEvents = 'auto';
                lab.style.opacity = '1';
                lab.style.borderColor = '#e9ecef';
                lab.style.background = '#fff';
            });

            updateScore();
        }

        questions.forEach(q => {
            const questionDiv = document.createElement('div');
            questionDiv.classList.add('question-container');
            questionDiv.innerHTML = `
                <div class="question">Question ${q.id}. ${q.question}</div>
                <div class="translation">${q.translation}</div>
                <div class="options">
                    ${q.options.map(opt => `
                        <label>
                            <input type="radio" name="q${q.id}" value="${opt.value}">
                            ${opt.text}
                        </label>
                    `).join('')}
                </div>
                <div class="feedback" id="feedback${q.id}"></div>
            `;
            quizContainer.appendChild(questionDiv);

            const radios = questionDiv.querySelectorAll(`input[name="q${q.id}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    if (questionState.get(q.id) === true) {
                        return;
                    }
                    const feedback = document.getElementById(`feedback${q.id}`);

                    // reset all labels in this question
                    questionDiv.querySelectorAll('.options label').forEach(lab => {
                        lab.style.borderColor = '#e9ecef';
                        lab.style.background = '#fff';
                        lab.style.opacity = '1';
                        lab.style.pointerEvents = 'auto';
                    });

                    const correctOpt = q.options.find(opt => opt.value === q.correctAnswer);
                    const isCorrect = radio.value === q.correctAnswer;
                    questionState.set(q.id, isCorrect);
                    recomputeScore();

                    feedback.classList.add('show');
                    if (isCorrect) {
                        feedback.textContent = `✅ Correct! The answer is (${q.correctAnswer})`;
                        feedback.classList.remove('incorrect');
                        feedback.classList.add('correct');
                        lockQuestion(q.id);
                    } else {
                        feedback.textContent = `❌ Incorrect. Try again. Correct answer is (${q.correctAnswer}) ${correctOpt ? correctOpt.text : ''}`;
                        feedback.classList.remove('correct');
                        feedback.classList.add('incorrect');
                    }

                    const selectedLabel = radio.closest('label');
                    if (selectedLabel) {
                        selectedLabel.style.borderColor = isCorrect ? '#28a745' : '#dc3545';
                        selectedLabel.style.background = isCorrect ? '#d4edda' : '#f8d7da';
                        selectedLabel.style.opacity = '1';
                    }

                    updateScore();
                });
            });
        });

        updateScore();
    </script>
