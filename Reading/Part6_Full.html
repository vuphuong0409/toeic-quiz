        let correctCount = 0;
        let incorrectCount = 0;
        const questionState = new Map();
        function getTotalQuestions() {
            return questionsData.reduce((sum, p) => sum + (p.questions?.length || 0), 0);
        }

        // Generate all questions
        function generateQuestions() {
            const container = document.getElementById('questionsContainer');
            
            questionsData.forEach((passage, passageIndex) => {
                // Create passage div
                const passageDiv = document.createElement('div');
                passageDiv.className = 'passage';
                passageDiv.innerHTML = `
                    <h2>${passage.passage}</h2>
                    <div class="passage-text">${passage.text}</div>
                `;
                container.appendChild(passageDiv);
                
                // Create questions for this passage
                passage.questions.forEach(q => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question-block';
                    
                    const optionsHTML = q.options.map((opt, idx) => {
                        const letter = String.fromCharCode(65 + idx);
                        return `
                            <div class="option" onclick="selectAnswer(this, '${q.id}', '${q.answer}')">
                                <input type="radio" name="${q.id}" value="${letter}" id="${q.id}${letter}">
                                <label for="${q.id}${letter}">(${letter}) ${opt}</label>
                            </div>
                        `;
                    }).join('');
                    
                    questionDiv.innerHTML = `
                        <span class="question-number">Question ${q.num}</span>
                        <div class="options">
                            ${optionsHTML}
                        </div>
                        <div class="answer-feedback" id="feedback-${q.id}"></div>
                    `;
                    
                    container.appendChild(questionDiv);
                });
                
                // Add divider after each passage except the last
                if (passageIndex < questionsData.length - 1) {
                    const divider = document.createElement('div');
                    divider.className = 'passage-divider';
                    container.appendChild(divider);
                }
            });
        }

        function recomputeScore() {
            let c = 0;
            let i = 0;
            for (const v of questionState.values()) {
                if (v === true) c++;
                else if (v === false) i++;
            }
            correctCount = c;
            incorrectCount = i;
        }

        function lockQuestion(questionId) {
            const options = document.querySelectorAll(`.option input[name=\"${questionId}\"]`);
            options.forEach(inp => {
                const opt = inp.closest('.option');
                if (opt) {
                    opt.style.pointerEvents = 'none';
                    opt.style.opacity = '0.7';
                }
            });
        }

        function selectAnswer(optionElement, questionId, correctAnswer) {
            if (questionState.get(questionId) === true) {
                return;
            }

            const selectedValue = optionElement.querySelector('input').value;
            const feedbackDiv = document.getElementById(`feedback-${questionId}`);
            const allOptions = optionElement.parentElement.querySelectorAll('.option');

            allOptions.forEach(opt => opt.classList.remove('selected-correct', 'selected-incorrect'));

            const isCorrect = selectedValue === correctAnswer;
            questionState.set(questionId, isCorrect);
            recomputeScore();

            if (isCorrect) {
                optionElement.classList.add('selected-correct');
                feedbackDiv.className = 'answer-feedback correct show';
                feedbackDiv.innerHTML = `✅ Correct! The answer is (${correctAnswer})`;
                lockQuestion(questionId);
            } else {
                optionElement.classList.add('selected-incorrect');
                feedbackDiv.className = 'answer-feedback incorrect show';
                feedbackDiv.innerHTML = `❌ Incorrect. Try again. Correct answer is (${correctAnswer})`;

                // Keep options clickable for retry
                allOptions.forEach(opt => {
                    opt.style.pointerEvents = 'auto';
                    opt.style.opacity = '1';
                });
            }

            optionElement.style.opacity = '1';
            updateScore();
        }

        function updateScore() {
            document.getElementById('correctScore').textContent = correctCount;
            document.getElementById('incorrectScore').textContent = incorrectCount;
            document.getElementById('totalScore').textContent = `${correctCount + incorrectCount}/${getTotalQuestions()}`;
        }

        function resetQuiz() {
            if (!confirm('Are you sure you want to reset the quiz? All progress will be lost.')) {
                return;
            }

            correctCount = 0;
            incorrectCount = 0;
            questionState.clear();
            updateScore();

            document.querySelectorAll('.question-block').forEach(block => {
                block.querySelectorAll('input[type="radio"]').forEach(input => {
                    input.checked = false;
                });

                block.querySelectorAll('.option').forEach(option => {
                    option.classList.remove('selected-correct', 'selected-incorrect');
                    option.style.pointerEvents = 'auto';
                    option.style.opacity = '1';
                });

                block.querySelectorAll('.answer-feedback').forEach(feedback => {
                    feedback.classList.remove('show');
                });
            });
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            generateQuestions();
        });
    </script>
