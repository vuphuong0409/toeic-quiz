
<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

        const quizContainer = document.getElementById('quiz-container');

        questions.forEach(q => {
            const questionDiv = document.createElement('div');
            questionDiv.classList.add('question-container');
            const imageHtml = q.image ? `<img src="${q.image}" width="400">` : "";
            questionDiv.innerHTML = `
                <div class="question">Question ${q.id}. ${q.question}</div>
                ${imageHtml}
                <div class="translation">${q.translation}</div>
                <div class="options">
                    ${q.options.map(opt => `
                        <label>
                            <input type="radio" name="q${q.id}" value="${opt.value}">
                            ${opt.value}. ${opt.text}
                        </label>
                    `).join('')}
                </div>
                <div class="feedback" id="feedback${q.id}"></div>
            `;
            quizContainer.appendChild(questionDiv);

            const radios = questionDiv.querySelectorAll(`input[name="q${q.id}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    const feedback = document.getElementById(`feedback${q.id}`);
                    if (radio.value === q.correctAnswer) {
                        feedback.textContent = 'Correct!';
                        feedback.classList.remove('incorrect');
                        feedback.classList.add('correct');
                    } else {
                        const correctOption = q.options.find(opt => opt.value === q.correctAnswer);
                        feedback.textContent = `Incorrect. The correct answer is ${correctOption.value}. ${correctOption.text}.`;
                        feedback.classList.remove('correct');
                        feedback.classList.add('incorrect');
                    }
                });
            });
        });
    </script>
